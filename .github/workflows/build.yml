name: Build and Release easysearch

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg $env:USERPROFILE\vcpkg
          & $env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat
          & $env:USERPROFILE\vcpkg\vcpkg.exe integrate install

      - name: Build solution
        shell: pwsh
        run: |
          msbuild .\easysearch.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:VcpkgEnableManifest=true `
            /m

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null

          Copy-Item ".\\x64\\Release\\easysearch.exe" ".\\package\\" -Force

          if (Test-Path ".\\x64\\Release\\*.dll") {
            Copy-Item ".\\x64\\Release\\*.dll" ".\\package\\" -Force
          }

          if (Test-Path ".\\easysearch\\title.ico") {
            Copy-Item ".\\easysearch\\title.ico" ".\\package\\" -Force
          }

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path .\\package\\* -DestinationPath .\\easysearch-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: easysearch-win-x64
          path: easysearch-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: easysearch-win-x64.zip
          generate_release_notes: true
